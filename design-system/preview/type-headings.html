<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type — Headings</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px 22px; background: var(--bg-paper); color: var(--chosen-navy); }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 4px 0; border-bottom: 1px dashed var(--border); }
  .row:last-child { border: none; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); width: 80px; flex-shrink: 0; }
  .h1 { font-size: 44px; }
  .h2 { font-size: 34px; }
  .h3 { font-size: 26px; }
  .h4 { font-size: 20px; }
  .h5 { font-size: 16px; }
</style>
</head>
<body>
  <div class="row"><div class="label">H1 · 700</div><div class="h1">Encounter Jesus</div></div>
  <div class="row"><div class="label">H2 · 700</div><div class="h2">A conference beyond the ordinary</div></div>
  <div class="row"><div class="label">H3 · 600</div><div class="h3">Bishops &amp; guest speakers</div></div>
  <div class="row"><div class="label">H4 · 600</div><div class="h4">Workshops &amp; theatre</div></div>
  <div class="row"><div class="label">H5 · 600</div><div class="h5">Registration is open</div></div>
</body>
</html>
