<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing tokens</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px 22px; background: var(--bg-paper); font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: 80px 60px 1fr; align-items: center; gap: 10px; padding: 5px 0; border-bottom: 1px dashed var(--border); }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--chosen-navy); }
  .px   { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
  .bar  { background: var(--chosen-gold); height: 14px; border-radius: 2px; }
</style>
</head>
<body>
  <div class="row"><div class="name">--space-1</div><div class="px">4px</div><div><div class="bar" style="width:4px"></div></div></div>
  <div class="row"><div class="name">--space-2</div><div class="px">8px</div><div><div class="bar" style="width:8px"></div></div></div>
  <div class="row"><div class="name">--space-3</div><div class="px">12px</div><div><div class="bar" style="width:12px"></div></div></div>
  <div class="row"><div class="name">--space-4</div><div class="px">16px</div><div><div class="bar" style="width:16px"></div></div></div>
  <div class="row"><div class="name">--space-5</div><div class="px">24px</div><div><div class="bar" style="width:24px"></div></div></div>
  <div class="row"><div class="name">--space-6</div><div class="px">32px</div><div><div class="bar" style="width:32px"></div></div></div>
  <div class="row"><div class="name">--space-7</div><div class="px">48px</div><div><div class="bar" style="width:48px"></div></div></div>
  <div class="row"><div class="name">--space-8</div><div class="px">64px</div><div><div class="bar" style="width:64px"></div></div></div>
  <div class="row"><div class="name">--space-9</div><div class="px">96px</div><div><div class="bar" style="width:96px"></div></div></div>
</body>
</html>
