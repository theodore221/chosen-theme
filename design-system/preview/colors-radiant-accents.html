<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Colors — Radiant Accents</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg-paper); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .swatch { border-radius: 10px; overflow: hidden; box-shadow: var(--shadow-sm); }
  .swatch .chip { aspect-ratio: 16 / 11; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px 12px; }
  .swatch .name { font-weight: 700; font-size: 12px; letter-spacing: 0.04em; text-transform: uppercase; }
  .swatch .hex  { font-family: var(--font-mono); font-size: 11px; opacity: 0.85; margin-top: 1px; }
  .meaning { font-size: 11px; color: var(--fg-muted); padding: 6px 12px 10px; line-height: 1.35; background: var(--neutral-0); }
</style>
</head>
<body>
  <div class="grid">
    <div class="swatch">
      <div class="chip" style="background: var(--chosen-yellow); color: var(--chosen-navy);">
        <div class="name">Yellow</div><div class="hex">#EBC903</div>
      </div>
      <div class="meaning">Inner sun ring — radiance.</div>
    </div>
    <div class="swatch">
      <div class="chip" style="background: var(--chosen-orange); color: white;">
        <div class="name">Orange</div><div class="hex">#FE4E0E</div>
      </div>
      <div class="meaning">Outer sun ring — radiant accent.</div>
    </div>
    <div class="swatch">
      <div class="chip" style="background: var(--chosen-black); color: white;">
        <div class="name">Black</div><div class="hex">#0A0A0A</div>
      </div>
      <div class="meaning">The CHOSEN wordmark.</div>
    </div>
    <div class="swatch">
      <div class="chip" style="background: var(--chosen-white); color: var(--fg); border: 1px solid var(--border);">
        <div class="name">White</div><div class="hex">#FFFFFF</div>
      </div>
      <div class="meaning">Breathing space, divine purity.</div>
    </div>
  </div>
</body>
</html>
