<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Eyebrow + Scripture pull</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--chosen-navy); color: white; font-family: var(--font-sans); }
  .eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: var(--chosen-gold); margin-bottom: 10px; }
  .pull { font-family: var(--font-sans); font-style: italic; font-weight: 300; font-size: 22px; line-height: 1.4; max-width: 580px; }
  .rule { width: 48px; height: 3px; background: var(--chosen-gold); margin-top: 14px; }
  .cite { font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--chosen-gold); margin-top: 10px; }
</style>
</head>
<body>
  <div class="eyebrow">Theme · Chosen 2026</div>
  <div class="pull">"Look to him, and be radiant; so your faces shall never be ashamed."</div>
  <div class="rule"></div>
  <div class="cite">Psalm 34:5</div>
</body>
</html>
