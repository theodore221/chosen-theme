<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 32px 22px; background: var(--bg-paper); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .card { width: 100px; height: 70px; background: white; border-radius: 8px; }
  .name { font-family: var(--font-mono); font-size: 10px; color: var(--chosen-navy); }
  .desc { font-size: 10px; color: var(--fg-muted); text-align: center; line-height: 1.3; }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell">
      <div class="card" style="box-shadow: var(--shadow-sm);"></div>
      <div class="name">--shadow-sm</div>
      <div class="desc">subtle lift<br>chips, fields</div>
    </div>
    <div class="cell">
      <div class="card" style="box-shadow: var(--shadow-md);"></div>
      <div class="name">--shadow-md</div>
      <div class="desc">cards, panels</div>
    </div>
    <div class="cell">
      <div class="card" style="box-shadow: var(--shadow-lg);"></div>
      <div class="name">--shadow-lg</div>
      <div class="desc">modals, popovers</div>
    </div>
    <div class="cell">
      <div class="card" style="box-shadow: var(--shadow-glow-gold); background: var(--chosen-navy);"></div>
      <div class="name">--shadow-glow-gold</div>
      <div class="desc">focus ring</div>
    </div>
  </div>
</body>
</html>
