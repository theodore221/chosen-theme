<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type — Wordmark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-paper); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; min-height: 100vh; box-sizing: border-box; }
  .wm { font-family: var(--font-sans); font-weight: 500; font-size: 64px; letter-spacing: 0.20em; color: var(--chosen-black); line-height: 1; }
  .wm .o { display: inline-block; width: 0.84em; height: 0.84em; vertical-align: -0.18em; background-image: url('../assets/chosen-mark.png'); background-size: contain; background-repeat: no-repeat; background-position: center; }
  .sub { font-family: var(--font-sans); font-weight: 400; font-size: 18px; letter-spacing: 0.34em; color: var(--chosen-black); text-transform: lowercase; margin-left: 0.4em; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); margin-top: 10px; }
</style>
</head>
<body>
  <div class="wm">CH<span class="o" aria-hidden="true"></span>SEN</div>
  <div class="sub">conference</div>
  <div class="meta">Work Sans · Medium 61pt + Regular 21pt (per brand guidelines)</div>
</body>
</html>
