<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Colors — Brand shades</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg-paper); }
  .stack { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .scale { display: grid; grid-template-columns: repeat(3, 1fr); border-radius: 8px; overflow: hidden; box-shadow: var(--shadow-sm); }
  .step { aspect-ratio: 1.6 / 1; padding: 8px 10px; display: flex; flex-direction: column; justify-content: flex-end; font-family: var(--font-mono); font-size: 10px; }
  .name { font-family: var(--font-sans); font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; font-size: 10px; }
  .hex { opacity: 0.85; }
  .label { font-family: var(--font-sans); font-weight: 700; font-size: 11px; color: var(--fg-muted); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 6px; }
</style>
</head>
<body>
  <div class="stack">
    <div>
      <div class="label">Navy scale</div>
      <div class="scale">
        <div class="step" style="background:#2A2A8C;color:#fff"><div class="name">500</div><div class="hex">#2A2A8C</div></div>
        <div class="step" style="background:#15146E;color:#fff"><div class="name">700</div><div class="hex">#15146E</div></div>
        <div class="step" style="background:#0B0A55;color:#fff"><div class="name">Base</div><div class="hex">#0B0A55</div></div>
      </div>
    </div>
    <div>
      <div class="label">Royal scale</div>
      <div class="scale">
        <div class="step" style="background:#7C9DC7;color:#0B0A55"><div class="name">300</div><div class="hex">#7C9DC7</div></div>
        <div class="step" style="background:#4071AC;color:#fff"><div class="name">Base</div><div class="hex">#4071AC</div></div>
        <div class="step" style="background:#2F5A91;color:#fff"><div class="name">700</div><div class="hex">#2F5A91</div></div>
      </div>
    </div>
    <div>
      <div class="label">Gold scale</div>
      <div class="scale">
        <div class="step" style="background:#F5C964;color:#0B0A55"><div class="name">300</div><div class="hex">#F5C964</div></div>
        <div class="step" style="background:#EDA90C;color:#0B0A55"><div class="name">Base</div><div class="hex">#EDA90C</div></div>
        <div class="step" style="background:#C68A06;color:#fff"><div class="name">600</div><div class="hex">#C68A06</div></div>
      </div>
    </div>
    <div>
      <div class="label">Red scale</div>
      <div class="scale">
        <div class="step" style="background:#F71A1D;color:#fff"><div class="name">Base</div><div class="hex">#F71A1D</div></div>
        <div class="step" style="background:#C81216;color:#fff"><div class="name">700</div><div class="hex">#C81216</div></div>
        <div class="step" style="background:#0B0A55;color:#fff;display:flex;align-items:center;justify-content:center"><div style="font-family:var(--font-sans);font-size:10px;opacity:.7;text-align:center;line-height:1.3">use red<br>sparingly</div></div>
      </div>
    </div>
  </div>
</body>
</html>
