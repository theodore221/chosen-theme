<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type — Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--bg-paper); }
  .word { font-family: var(--font-display); font-size: 88px; line-height: 0.9; color: var(--chosen-red); text-transform: uppercase; letter-spacing: -0.005em; }
  .word .be { color: var(--chosen-gold); }
  .meta { display: flex; gap: 18px; margin-top: 16px; font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
  .meta b { color: var(--chosen-navy); font-weight: 700; }
</style>
</head>
<body>
  <div class="word"><span class="be">Be</span> Radiant</div>
  <div class="meta">
    <div><b>Anton</b> · 88px</div>
    <div>weight 400 · tracking -0.5%</div>
    <div>line-height 0.9</div>
  </div>
</body>
</html>
