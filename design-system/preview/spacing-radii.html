<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: var(--bg-paper); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 64px; height: 64px; background: var(--chosen-navy); border: 2px solid var(--chosen-gold); }
  .name { font-family: var(--font-mono); font-size: 10px; color: var(--chosen-navy); }
  .px   { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell"><div class="box" style="border-radius: 2px;"></div><div class="name">--radius-xs</div><div class="px">2px</div></div>
    <div class="cell"><div class="box" style="border-radius: 4px;"></div><div class="name">--radius-sm</div><div class="px">4px</div></div>
    <div class="cell"><div class="box" style="border-radius: 8px;"></div><div class="name">--radius-md</div><div class="px">8px</div></div>
    <div class="cell"><div class="box" style="border-radius: 14px;"></div><div class="name">--radius-lg</div><div class="px">14px</div></div>
    <div class="cell"><div class="box" style="border-radius: 22px;"></div><div class="name">--radius-xl</div><div class="px">22px</div></div>
    <div class="cell"><div class="box" style="border-radius: 50%;"></div><div class="name">--radius-circle</div><div class="px">50% (logo)</div></div>
  </div>
</body>
</html>
