<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Colors — Brand Core</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg-paper); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .swatch { border-radius: 10px; overflow: hidden; box-shadow: var(--shadow-sm); }
  .swatch .chip { aspect-ratio: 16 / 11; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px 12px; }
  .swatch .name { font-weight: 700; font-size: 12px; letter-spacing: 0.04em; text-transform: uppercase; }
  .swatch .hex  { font-family: var(--font-mono); font-size: 11px; opacity: 0.85; margin-top: 1px; }
  .meaning { font-size: 11px; color: var(--fg-muted); padding: 6px 12px 10px; line-height: 1.35; background: var(--neutral-0); }
</style>
</head>
<body>
  <div class="grid">
    <div class="swatch">
      <div class="chip" style="background: var(--chosen-navy); color: white;">
        <div class="name">Navy</div><div class="hex">#0B0A55</div>
      </div>
      <div class="meaning">The faithful — royalty, the chosen children of God.</div>
    </div>
    <div class="swatch">
      <div class="chip" style="background: var(--chosen-royal); color: white;">
        <div class="name">Royal Blue</div><div class="hex">#4071AC</div>
      </div>
      <div class="meaning">Sky — God coming down from heaven.</div>
    </div>
    <div class="swatch">
      <div class="chip" style="background: var(--chosen-gold); color: var(--chosen-navy);">
        <div class="name">Gold</div><div class="hex">#EDA90C</div>
      </div>
      <div class="meaning">The Tau cross — the light of truth.</div>
    </div>
    <div class="swatch">
      <div class="chip" style="background: var(--chosen-red); color: white;">
        <div class="name">Red</div><div class="hex">#F71A1D</div>
      </div>
      <div class="meaning">Youth beckoning for Christ; candles of enlightenment.</div>
    </div>
  </div>
</body>
</html>
