<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type — Body & scripture</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px 22px; background: var(--bg-paper); }
  .block { margin-bottom: 12px; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); margin-bottom: 4px; }
  .body-lg { font-size: 17px; line-height: 1.55; color: var(--chosen-navy); max-width: 600px; }
  .body { font-size: 14px; line-height: 1.5; color: var(--fg); max-width: 600px; }
  .scripture { font-family: var(--font-sans); font-weight: 300; font-style: italic; font-size: 18px; line-height: 1.5; color: var(--chosen-navy); max-width: 580px; }
  .cite { font-weight: 700; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--chosen-gold); margin-bottom: 4px; }
</style>
</head>
<body>
  <div class="block">
    <div class="label">body-lg · 17 / 1.55</div>
    <div class="body-lg">Come and get equipped to be a leader with practical, life-changing steps that help you boldly live a life of purpose.</div>
  </div>
  <div class="block">
    <div class="cite">Psalm 34:5</div>
    <div class="scripture">"Look to him, and be radiant; so your faces shall never be ashamed."</div>
  </div>
</body>
</html>
