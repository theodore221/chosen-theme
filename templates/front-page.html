<!-- wp:chosen/story-section {"eyebrow":"An encounter, not just an event","heading":"Four days. One mission. Thousands of young Australians.","body":"<p>Chosen is a four-day Catholic conference for young Australians who are open to encountering God in a real and personal way.</p><p>Hosted by Jesus Youth Australia, the conference brings together teens (16+), young adults and young couples from across the country. Over four days you'll experience worship, talks, prayer, Mass, Adoration, workshops and rallies, but the highlight is the community.</p><p>There's something about being in a room full of young people from every corner of Australia, all searching for the same thing. Chosen is the space for that encounter to happen.</p><p class=\"chosen-story__cadence\">God is calling young people today. God is calling you, intimately, by name. <strong>Be Radiant.</strong></p>","layout":"stacked","background":"paper","anchor":"intro"} /-->

<!-- wp:chosen/story-section {"eyebrow":"Why Chosen now","heading":"The Church is building toward something, and you're part of it.","body":"<p>For those who know Chosen Conference, this isn't the first time it's happened. So why now?</p><p>Chosen last ran in 2019. Then COVID hit, and like so much else, it paused. But now it's back, and the timing matters.</p><p>The Church is building toward something significant. <strong>World Youth Day</strong> arrives in Korea in 2027. The <strong>54th International Eucharistic Congress</strong> comes to Sydney in 2028, a major global Catholic gathering focused on the Real Presence of Jesus in the Eucharist. And in 2033, we mark the <strong>2000th anniversary of the Redemption</strong> of Jesus Christ.</p><p>These aren't just calendar events. They're a moment the Church is preparing for, and young people are at the heart of that preparation.</p><p>We believe this generation of young Australians has a real role to play in all of it. But that starts here, now, with young people who are rooted in Jesus, who know who they are, who they belong to, and what they're called to.</p><p><strong>Chosen is part of that preparation.</strong></p>","layout":"stacked","background":"paper","anchor":"why-now"} /-->

<!-- wp:chosen/story-section {"eyebrow":"About Jesus Youth","heading":"A global movement of young missionary disciples.","body":"<p>Jesus Youth is an international not-for-profit Catholic movement dedicated to evangelising young people and forming them as missionary disciples. What began as a small gathering of young people in the 1980s has grown into a global movement active in more than 40 countries across Asia, Europe, Africa, the Middle East, North America and Oceania.</p><p>In May 2016, Jesus Youth was officially recognised by the Vatican (Dicastery for Laity, Family and Life) as an International Private Association of the Faithful with juridical personality, affirming its mission within the life of the Catholic Church.</p><p>Jesus Youth Australia began in 2004, when a small number of members migrated here and started forming prayer communities. Today, active groups exist all across Australia, creating spaces, through retreats, conferences, prayer gatherings and outreach, where young people can encounter Christ, build authentic friendships, and grow as leaders in the Church and society.</p>","layout":"split-photo-right","photoStem":"dsc00635","background":"cream","anchor":"about"} /-->
